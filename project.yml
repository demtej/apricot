name: Apricot
options:
  bundleIdPrefix: com.apricot
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    majorVersion: 3.0.0
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    majorVersion: 1.17.6

targets:
  Apricot:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Apricot
    configFiles:
      Debug: Config/Apricot.xcconfig
      Release: Config/Apricot.xcconfig
    settings:
      SWIFT_VERSION: "5"
      PRODUCT_BUNDLE_IDENTIFIER: com.apricot.app
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      TARGETED_DEVICE_FAMILY: "1"
      INFOPLIST_FILE: Apricot/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ENABLE_TESTABILITY: YES
    dependencies:
      - package: PostHog
        product: PostHog
      - framework: shared/build/XCFrameworks/debug/shared.xcframework
        embed: true

  ApricotTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ApricotTests
    settings:
      SWIFT_VERSION: "5"
      PRODUCT_BUNDLE_IDENTIFIER: com.apricot.tests
      GENERATE_INFOPLIST_FILE: YES
      TEST_HOST: $(BUILT_PRODUCTS_DIR)/Apricot.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Apricot
      BUNDLE_LOADER: $(TEST_HOST)
    dependencies:
      - target: Apricot

  ApricotSnapshotTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ApricotSnapshotTests
    settings:
      SWIFT_VERSION: "5"
      PRODUCT_BUNDLE_IDENTIFIER: com.apricot.snapshot-tests
      GENERATE_INFOPLIST_FILE: YES
      TEST_HOST: $(BUILT_PRODUCTS_DIR)/Apricot.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Apricot
      BUNDLE_LOADER: $(TEST_HOST)
    dependencies:
      - target: Apricot
      - package: SnapshotTesting
        product: SnapshotTesting

schemes:
  Apricot:
    build:
      targets:
        Apricot: all
    run:
      config: Debug
    archive:
      config: Release

  ApricotUnitTests:
    build:
      targets:
        Apricot: all
        ApricotTests: [test]
    test:
      targets:
        - name: ApricotTests
    run:
      config: Debug
    archive:
      config: Release

  ApricotSnapshotTests:
    build:
      targets:
        Apricot: all
        ApricotSnapshotTests: [test]
    test:
      targets:
        - name: ApricotSnapshotTests
    run:
      config: Debug
    archive:
      config: Release

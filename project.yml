name: Apricot
options:
  bundleIdPrefix: com.apricot
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  Apricot:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Apricot
    settings:
      SWIFT_VERSION: "5"
      PRODUCT_BUNDLE_IDENTIFIER: com.apricot.app
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      TARGETED_DEVICE_FAMILY: "1"
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      ENABLE_TESTABILITY: YES
    dependencies:
      - framework: shared/build/XCFrameworks/debug/shared.xcframework
        embed: true

  ApricotTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ApricotTests
    settings:
      SWIFT_VERSION: "5"
      PRODUCT_BUNDLE_IDENTIFIER: com.apricot.tests
      GENERATE_INFOPLIST_FILE: YES
      TEST_HOST: $(BUILT_PRODUCTS_DIR)/Apricot.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Apricot
      BUNDLE_LOADER: $(TEST_HOST)
    dependencies:
      - target: Apricot

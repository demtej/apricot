name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-ci
  DERIVED_DATA_PATH: ${{ github.workspace }}/DerivedData

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SwiftLint
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew list swiftlint >/dev/null 2>&1 || brew install swiftlint

      - name: Run SwiftLint
        run: make lint

  swiftformat:
    name: SwiftFormat
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SwiftFormat
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew list swiftformat >/dev/null 2>&1 || brew install swiftformat

      - name: Run SwiftFormat check
        run: make format-check

  kmp-tests:
    name: KMP Tests
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run KMP tests
        run: ./gradlew :shared:allTests

  ios-unit-tests:
    name: iOS Unit Tests
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Build KMP XCFramework
        run: make kmp

      - name: Generate Xcode project
        run: make xcode

      - name: Resolve iOS simulator destination
        id: simulator
        run: |
          chmod +x scripts/ci/select-ios-simulator.sh
          echo "destination=$(scripts/ci/select-ios-simulator.sh Apricot.xcodeproj Apricot)" >> "$GITHUB_OUTPUT"

      - name: Run Apricot unit tests
        run: |
          xcodebuild \
            -project Apricot.xcodeproj \
            -scheme ApricotUnitTests \
            -destination "${{ steps.simulator.outputs.destination }}" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            test

  ios-snapshot-tests:
    name: iOS Snapshot Tests
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Build KMP XCFramework
        run: make kmp

      - name: Generate Xcode project
        run: make xcode

      - name: Resolve iPhone 17 Pro simulator destination
        id: snapshot-simulator
        run: |
          chmod +x scripts/ci/select-ios-simulator.sh
          echo "destination=$(scripts/ci/select-ios-simulator.sh Apricot.xcodeproj Apricot 'iPhone 17 Pro')" >> "$GITHUB_OUTPUT"

      - name: Run Apricot snapshot tests
        run: |
          xcodebuild \
            -project Apricot.xcodeproj \
            -scheme ApricotSnapshotTests \
            -destination "${{ steps.snapshot-simulator.outputs.destination }}" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            test

  ios-build:
    name: iOS Build
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Build KMP XCFramework
        run: make kmp

      - name: Generate Xcode project
        run: make xcode

      - name: Resolve iOS simulator destination
        id: simulator
        run: |
          chmod +x scripts/ci/select-ios-simulator.sh
          echo "destination=$(scripts/ci/select-ios-simulator.sh Apricot.xcodeproj Apricot)" >> "$GITHUB_OUTPUT"

      - name: Build Apricot app
        run: |
          xcodebuild \
            -project Apricot.xcodeproj \
            -scheme Apricot \
            -destination "${{ steps.simulator.outputs.destination }}" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            build

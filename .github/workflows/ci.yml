name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-ci
  DERIVED_DATA_PATH: ${{ github.workspace }}/DerivedData

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SwiftLint
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew list swiftlint >/dev/null 2>&1 || brew install swiftlint

      - name: Run SwiftLint
        run: make lint

  swiftformat:
    name: SwiftFormat
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SwiftFormat
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew list swiftformat >/dev/null 2>&1 || brew install swiftformat

      - name: Run SwiftFormat check
        run: make format-check

  kmp-tests:
    name: KMP Tests
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run KMP tests
        run: ./gradlew :shared:allTests

  ios-unit-tests:
    name: iOS Unit Tests
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Build KMP XCFramework
        run: make kmp

      - name: Generate Xcode project
        run: make xcode

      - name: List Xcode schemes
        run: xcodebuild -project Apricot.xcodeproj -list

      - name: Resolve iOS simulator destination
        id: simulator
        run: |
          set -euo pipefail
          chmod +x scripts/ci/select-ios-simulator.sh
          DEST=$(scripts/ci/select-ios-simulator.sh Apricot.xcodeproj ApricotUnitTests)
          if [[ -z "$DEST" ]]; then
            echo "ERROR: Simulator destination resolved to empty string" >&2
            exit 1
          fi
          echo "destination=$DEST" >> "$GITHUB_OUTPUT"

      - name: Run iOS unit tests
        id: unit-tests
        run: |
          set -euo pipefail
          DEST="${{ steps.simulator.outputs.destination }}"
          if [[ -z "$DEST" ]]; then
            echo "ERROR: destination is empty — check the 'Resolve iOS simulator destination' step" >&2
            exit 1
          fi
          xcodebuild \
            -project Apricot.xcodeproj \
            -scheme ApricotUnitTests \
            -destination "$DEST" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -resultBundlePath unit-tests.xcresult \
            test

      - name: Upload unit test result bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-tests-xcresult
          path: unit-tests.xcresult
          if-no-files-found: warn
          retention-days: 7

  ios-snapshot-tests:
    name: iOS Snapshot Tests
    runs-on: macos-latest

    env:
      TZ: UTC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Build KMP XCFramework
        run: make kmp

      - name: Generate Xcode project
        run: make xcode

      - name: List Xcode schemes
        run: xcodebuild -project Apricot.xcodeproj -list

      - name: Resolve iPhone 17 Pro simulator destination
        id: snapshot-simulator
        run: |
          set -euo pipefail
          chmod +x scripts/ci/select-ios-simulator.sh
          DEST=$(scripts/ci/select-ios-simulator.sh Apricot.xcodeproj ApricotSnapshotTests 'iPhone 17 Pro')
          if [[ -z "$DEST" ]]; then
            echo "ERROR: iPhone 17 Pro simulator destination resolved to empty string" >&2
            exit 1
          fi
          echo "destination=$DEST" >> "$GITHUB_OUTPUT"

      - name: Run iOS snapshot tests
        id: snapshot-tests
        run: |
          set -euo pipefail
          DEST="${{ steps.snapshot-simulator.outputs.destination }}"
          if [[ -z "$DEST" ]]; then
            echo "ERROR: destination is empty — check the 'Resolve iPhone 17 Pro simulator destination' step" >&2
            exit 1
          fi
          xcodebuild \
            -project Apricot.xcodeproj \
            -scheme ApricotSnapshotTests \
            -destination "$DEST" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -resultBundlePath snapshot-tests.xcresult \
            test

      - name: Upload snapshot test result bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-tests-xcresult
          path: snapshot-tests.xcresult
          if-no-files-found: warn
          retention-days: 7

      - name: Upload snapshot failure images
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-failures
          path: /tmp/com.pointfreeco.swift-snapshot-testing
          if-no-files-found: warn
          retention-days: 7

  ios-build:
    name: iOS Build
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Build KMP XCFramework
        run: make kmp

      - name: Generate Xcode project
        run: make xcode

      - name: Build Apricot app
        run: |
          xcodebuild \
            -project Apricot.xcodeproj \
            -scheme Apricot \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            build

name: Update Snapshots

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-ci
  DERIVED_DATA_PATH: ${{ github.workspace }}/DerivedData
  TZ: UTC

jobs:
  update-snapshots:
    name: Record snapshot references
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Build KMP XCFramework
        run: make kmp

      - name: Generate Xcode project
        run: make xcode

      - name: Resolve iPhone 17 Pro simulator destination
        id: snapshot-simulator
        run: |
          set -euo pipefail
          chmod +x scripts/ci/select-ios-simulator.sh
          DEST=$(scripts/ci/select-ios-simulator.sh 'iPhone 17 Pro')
          if [[ -z "$DEST" ]]; then
            echo "ERROR: iPhone 17 Pro simulator not available on this runner" >&2
            exit 1
          fi
          echo "destination=$DEST" >> "$GITHUB_OUTPUT"

      - name: Boot simulator
        run: |
          set -euo pipefail
          UDID="${{ steps.snapshot-simulator.outputs.destination }}"
          UDID="${UDID#id=}"
          xcrun simctl boot "$UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$UDID" -b

      - name: Record snapshot references
        run: |
          set -euo pipefail
          DEST="${{ steps.snapshot-simulator.outputs.destination }}"
          xcodebuild \
            -project Apricot.xcodeproj \
            -scheme ApricotSnapshotTests \
            -destination "$DEST" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -resultBundlePath snapshot-record.xcresult \
            -testenv RECORD_SNAPSHOTS=1 \
            test || true

      - name: Commit updated snapshot references
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ApricotSnapshotTests/Snapshots/__Snapshots__
          if git diff --staged --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "Update snapshot references from CI runner

            Runner: ${{ runner.os }} / ${{ runner.arch }}
            Xcode: $(xcodebuild -version | head -1)
            Ref: ${{ github.ref_name }}
            Run: ${{ github.run_id }}"
            git push
          fi

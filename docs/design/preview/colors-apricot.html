<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { padding: 20px; font-family: var(--font-sans); color: var(--fg-primary); }
  .scale { display: grid; grid-template-columns: repeat(9, 1fr); gap: 6px; }
  .swatch { aspect-ratio: 1 / 1.1; border-radius: var(--radius-md); padding: 8px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid rgba(0,0,0,0.04); }
  .step { font-size: 11px; font-weight: 600; }
  .hex  { font-family: var(--font-mono); font-size: 10px; opacity: 0.85; }
  .label { font-size: 11px; color: var(--fg-secondary); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; margin-bottom: 10px; }
</style>
</head><body>
  <div class="label">Apricot — primary scale</div>
  <div class="scale">
    <div class="swatch" style="background:#FFF6EE; color:#7E3C1E"><div class="step">50</div><div class="hex">FFF6EE</div></div>
    <div class="swatch" style="background:#FFE8D2; color:#7E3C1E"><div class="step">100</div><div class="hex">FFE8D2</div></div>
    <div class="swatch" style="background:#FBD3AE; color:#7E3C1E"><div class="step">200</div><div class="hex">FBD3AE</div></div>
    <div class="swatch" style="background:#F7B884; color:#4A2412"><div class="step">300</div><div class="hex">F7B884</div></div>
    <div class="swatch" style="background:#F4A26B; color:#fff; outline: 2px solid #EE8A4E; outline-offset: -1px"><div class="step">400 ★</div><div class="hex">F4A26B</div></div>
    <div class="swatch" style="background:#EE8A4E; color:#fff"><div class="step">500</div><div class="hex">EE8A4E</div></div>
    <div class="swatch" style="background:#D9703A; color:#fff"><div class="step">600</div><div class="hex">D9703A</div></div>
    <div class="swatch" style="background:#B0552A; color:#fff"><div class="step">700</div><div class="hex">B0552A</div></div>
    <div class="swatch" style="background:#7E3C1E; color:#fff"><div class="step">800</div><div class="hex">7E3C1E</div></div>
  </div>
</body></html>

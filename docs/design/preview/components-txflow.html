<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { padding: 18px; font-family: var(--font-sans); }
  .label { font-size: 11px; color: var(--fg-secondary); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; margin-bottom: 14px; }
  .flow { display: grid; grid-template-columns: 1fr 60px 1fr; gap: 12px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 6px; }
  .node { background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 10px 12px; display: flex; justify-content: space-between; gap: 8px; align-items: center; }
  .node .a { font-family: var(--font-mono); font-size: 11px; color: var(--fg-secondary); letter-spacing: -0.01em; }
  .node .v { font-family: var(--font-mono); font-size: 13px; font-weight: 500; color: var(--fg-primary); font-variant-numeric: tabular-nums; }
  .center { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .pill { background: var(--accent-soft); color: var(--apricot-700); font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: var(--radius-full); }
  .arrow { width: 100%; height: 2px; background: linear-gradient(to right, var(--apricot-200), var(--apricot-400)); position: relative; }
  .arrow::after { content: ''; position: absolute; right: -1px; top: -4px; width: 0; height: 0; border-left: 8px solid var(--apricot-400); border-top: 5px solid transparent; border-bottom: 5px solid transparent; }
  .head { font-size: 11px; color: var(--fg-secondary); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; margin-bottom: 6px; }
</style>
</head><body>
  <div class="label">Transaction flow — inputs → outputs</div>
  <div class="flow">
    <div class="col">
      <div class="head">From (2 inputs)</div>
      <div class="node"><span class="a">bc1q…h7d2</span><span class="v">0.0285</span></div>
      <div class="node"><span class="a">bc1q…m4kp</span><span class="v">0.0200</span></div>
    </div>
    <div class="center">
      <div class="pill">0.0480</div>
      <div class="arrow"></div>
      <div style="font-size:10px;color:var(--fg-muted);font-family:var(--font-mono)">fee 5k</div>
    </div>
    <div class="col">
      <div class="head">To (1 output)</div>
      <div class="node"><span class="a">bc1q…59gt</span><span class="v">0.04795</span></div>
    </div>
  </div>
</body></html>

<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { padding: 20px; font-family: var(--font-sans); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .label { font-size: 11px; color: var(--fg-secondary); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; margin-bottom: 12px; }
</style>
</head><body>
  <div class="label">Badges &amp; chips</div>
  <div class="row">
    <span class="badge badge-in"><span class="badge-dot"></span>Received</span>
    <span class="badge badge-out"><span class="badge-dot"></span>Sent</span>
    <span class="badge badge-pending"><span class="badge-dot"></span>Pending</span>
    <span class="badge badge-info">2 confirmations</span>
    <span class="badge badge-neutral">P2WPKH</span>
  </div>
  <div class="row">
    <span class="chip chip-active">All</span>
    <span class="chip">Received</span>
    <span class="chip">Sent</span>
    <span class="chip">Pending</span>
  </div>
</body></html>

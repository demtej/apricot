<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { padding: 20px; font-family: var(--font-sans); color: var(--fg-primary); }
  .row { display: flex; align-items: center; gap: 16px; padding: 8px 0; }
  .row + .row { border-top: 1px solid var(--border-subtle); }
  .name { width: 60px; font-size: 12px; color: var(--fg-secondary); font-family: var(--font-mono); }
  .px { width: 50px; font-size: 12px; color: var(--fg-muted); font-family: var(--font-mono); text-align: right; }
  .bar { height: 12px; background: var(--accent-soft); border-radius: 4px; }
  .label { font-size: 11px; color: var(--fg-secondary); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; margin-bottom: 12px; }
</style>
</head><body>
  <div class="label">Spacing scale · 4px base</div>
  <div class="row"><div class="name">space-1</div><div class="px">4</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="name">space-2</div><div class="px">8</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="name">space-3</div><div class="px">12</div><div class="bar" style="width:12px"></div></div>
  <div class="row"><div class="name">space-4</div><div class="px">16</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="name">space-5</div><div class="px">20</div><div class="bar" style="width:20px"></div></div>
  <div class="row"><div class="name">space-6</div><div class="px">24</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="name">space-8</div><div class="px">32</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="name">space-10</div><div class="px">40</div><div class="bar" style="width:40px"></div></div>
  <div class="row"><div class="name">space-12</div><div class="px">48</div><div class="bar" style="width:48px"></div></div>
  <div class="row"><div class="name">space-16</div><div class="px">64</div><div class="bar" style="width:64px"></div></div>
</body></html>

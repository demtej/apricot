<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-surface); }
  body { padding: 20px; font-family: var(--font-sans); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .label { font-size: 11px; color: var(--fg-secondary); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; margin-bottom: 12px; }
</style>
</head><body>
  <div class="label">Cards — flat, default (shadow-xs), elevated (shadow-md)</div>
  <div class="row">
    <div class="card-flat" style="width:200px">
      <div class="t-title">Flat</div>
      <div class="t-caption" style="margin-top:4px">Sits on surface, no shadow.</div>
    </div>
    <div class="card" style="width:200px">
      <div class="t-title">Default</div>
      <div class="t-caption" style="margin-top:4px">Subtle border + shadow.</div>
    </div>
    <div class="card-elevated" style="width:200px">
      <div class="t-title">Elevated</div>
      <div class="t-caption" style="margin-top:4px">For sheets, popovers.</div>
    </div>
  </div>
</body></html>

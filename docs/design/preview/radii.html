<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { padding: 20px; font-family: var(--font-sans); color: var(--fg-primary); }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; align-items: end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 70px; height: 70px; background: var(--accent-soft); border: 1px solid var(--apricot-300); }
  .name { font-size: 11px; color: var(--fg-primary); font-weight: 500; font-family: var(--font-mono); }
  .px { font-size: 10px; color: var(--fg-muted); font-family: var(--font-mono); }
  .label { font-size: 11px; color: var(--fg-secondary); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; margin-bottom: 16px; }
</style>
</head><body>
  <div class="label">Corner radii</div>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="name">xs</div><div class="px">6px</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="name">sm</div><div class="px">8px</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="name">md</div><div class="px">12px</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="name">lg</div><div class="px">16px</div></div>
    <div class="item"><div class="box" style="border-radius:20px"></div><div class="name">xl</div><div class="px">20px</div></div>
    <div class="item"><div class="box" style="border-radius:28px"></div><div class="name">2xl</div><div class="px">28px</div></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><div class="name">full</div><div class="px">pill</div></div>
  </div>
</body></html>

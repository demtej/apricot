<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-surface); }
  body { padding: 28px; font-family: var(--font-sans); color: var(--fg-primary); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; align-items: end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 100%; height: 80px; background: var(--bg-elevated); border-radius: var(--radius-md); border: 1px solid var(--border-subtle); }
  .name { font-size: 12px; color: var(--fg-primary); font-weight: 500; }
  .desc { font-size: 11px; color: var(--fg-secondary); }
  .label { font-size: 11px; color: var(--fg-secondary); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; margin-bottom: 16px; }
</style>
</head><body>
  <div class="label">Elevation — soft, warm shadows</div>
  <div class="grid">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="name">xs</div><div class="desc">borders, list rows</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="name">sm</div><div class="desc">resting cards</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="name">md</div><div class="desc">elevated surfaces</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="name">lg</div><div class="desc">modals, sheets</div></div>
  </div>
</body></html>

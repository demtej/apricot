<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-surface); }
  body { padding: 20px; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .label { font-size: 11px; color: var(--fg-secondary); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; margin-bottom: 12px; }
</style>
</head><body>
  <div class="label">Stat cards — sans labels, mono numerals</div>
  <div class="grid">
    <div class="stat-card">
      <span class="label">Confirmed balance</span>
      <span><span class="value">0.04827</span><span class="unit">BTC</span></span>
    </div>
    <div class="stat-card">
      <span class="label">Total received</span>
      <span><span class="value">2.31094</span><span class="unit">BTC</span></span>
    </div>
    <div class="stat-card">
      <span class="label">Transactions</span>
      <span><span class="value">147</span></span>
    </div>
  </div>
</body></html>

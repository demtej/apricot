<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #2b2520; }
  body { padding: 20px; font-family: var(--font-sans); }
  .panel { background: #1A1612; padding: 18px; border-radius: var(--radius-lg); display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; border: 1px solid #2C2620; }
  .swatch { aspect-ratio: 1 / 1; border-radius: var(--radius-md); padding: 10px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid rgba(255,255,255,0.05); }
  .step { font-size: 11px; font-weight: 600; }
  .hex  { font-family: var(--font-mono); font-size: 10px; opacity: 0.85; }
  .label { font-size: 11px; color: #A89C86; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; margin-bottom: 12px; }
</style>
</head><body>
  <div class="label" style="color:#E6DCCB">Dark theme — surfaces &amp; accent</div>
  <div class="panel">
    <div class="swatch" style="background:#1A1612; color:#E6DCCB"><div class="step">page</div><div class="hex">1A1612</div></div>
    <div class="swatch" style="background:#221D17; color:#E6DCCB"><div class="step">surface</div><div class="hex">221D17</div></div>
    <div class="swatch" style="background:#2C2620; color:#E6DCCB"><div class="step">elevated</div><div class="hex">2C2620</div></div>
    <div class="swatch" style="background:#3A332B; color:#E6DCCB"><div class="step">border</div><div class="hex">3A332B</div></div>
    <div class="swatch" style="background:#F7B884; color:#1A1612"><div class="step">accent</div><div class="hex">F7B884</div></div>
  </div>
</body></html>
